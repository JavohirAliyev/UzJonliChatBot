name: Build and deploy ASP.Net Core BotHost to Azure Web App - uzjonlichat

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build BotHost
        run: dotnet build UzJonliChatBot.BotHost/UzJonliChatBot.BotHost.csproj -c Release

      - name: Publish BotHost
        run: dotnet publish UzJonliChatBot.BotHost/UzJonliChatBot.BotHost.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: bothost-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: bothost-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy BotHost to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'uzjonlichat'
          slot-name: 'Production'
          package: ${{env.DOTNET_ROOT}}/myapp
